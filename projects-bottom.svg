  <rect x="392" y="176" width="64" height="16" rx="8" fill="none" stroke="#00e5cc" stroke-width="0.5" opacity="0.3"/>
  <text x="424" y="188" text-anchor="middle" font-size="9" fill="#00e5cc" font-weight="600">Aggregation</text>
  <rect x="464" y="176" width="56" height="16" rx="8" fill="#b39dff" opacity="0.10"/>
  <rect x="464" y="176" width="56" height="16" rx="8" fill="none" stroke="#b39dff" stroke-width="0.5" opacity="0.3"/>
  <text x="492" y="188" text-anchor="middle" font-size="9" fill="#b39dff" font-weight="600">MongoDB</text>

  <!-- CARD 6 — green→purple -->
