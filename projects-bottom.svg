  <rect x="100" y="176" width="48" height="16" rx="8" fill="none" stroke="#ffdc00" stroke-width="0.5" opacity="0.3"/>
  <text x="124" y="188" text-anchor="middle" font-size="9" fill="#ffdc00" font-weight="600">Node.js</text>
  <rect x="156" y="176" width="56" height="16" rx="8" fill="#ffdc00" opacity="0.10"/>
