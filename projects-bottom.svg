<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fff0"/>
      <stop offset="100%" style="stop-color:#fff8f0"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd60a"/>
      <stop offset="100%" style="stop-color:#f77f00"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f72585"/>
      <stop offset="100%" style="stop-color:#4361ee"/>
    </linearGradient>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7209b7"/>
      <stop offset="100%" style="stop-color:#06d6a0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#00000012"/>
    </filter>
    <filter id="blobBlur">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="900" height="220" fill="url(#bg)" rx="16"/>
  <circle cx="200" cy="160" r="70" fill="#ffd60a" opacity="0.06" filter="url(#blobBlur)"/>
  <circle cx="700" cy="60" r="60" fill="#7209b7" opacity="0.06" filter="url(#blobBlur)"/>

  <text x="30" y="34" font-size="13" font-weight="700" fill="#888" letter-spacing="2">🏆  SYSTEMS I'VE SHIPPED  —  row 2 of 2</text>

  <!-- CARD 4: Contact & Coupon Management -->
  <rect x="30" y="50" width="264" height="148" rx="14" fill="white" filter="url(#shadow)" opacity="0.95"/>
  <rect x="30" y="50" width="264" height="5" rx="2.5" fill="url(#g4)"/>
  <text x="52" y="96" font-size="28">📋</text>
  <text x="92" y="88" font-size="14" font-weight="700" fill="#222">Contact &amp; Coupon Mgmt</text>
  <text x="92" y="104" font-size="11" fill="#999">CRM · Promotions · Full-Stack</text>
  <text x="50" y="128" font-size="11" fill="#555">Built contact management with tagging,</text>
  <text x="50" y="144" font-size="11" fill="#555">filtering, and coupon system for discount</text>
  <text x="50" y="160" font-size="11" fill="#555">campaigns with validation rules.</text>
  <rect x="50" y="172" width="52" height="16" rx="8" fill="#fff8e0"/>
  <text x="76" y="184" text-anchor="middle" font-size="9" fill="#f77f00" font-weight="600">React</text>
  <rect x="110" y="172" width="60" height="16" rx="8" fill="#fff8e0"/>
  <text x="140" y="184" text-anchor="middle" font-size="9" fill="#f77f00" font-weight="600">Node.js</text>
  <rect x="178" y="172" width="60" height="16" rx="8" fill="#fff8e0"/>
  <text x="208" y="184" text-anchor="middle" font-size="9" fill="#f77f00" font-weight="600">MongoDB</text>

  <!-- CARD 5: LMS Reports + Accounting -->
  <rect x="318" y="50" width="264" height="148" rx="14" fill="white" filter="url(#shadow)" opacity="0.95"/>
  <rect x="318" y="50" width="264" height="5" rx="2.5" fill="url(#g5)"/>
  <text x="340" y="96" font-size="28">📈</text>
  <text x="380" y="88" font-size="14" font-weight="700" fill="#222">LMS Reports &amp; Accounting</text>
  <text x="380" y="104" font-size="11" fill="#999">Analytics · Finance · Dashboards</text>
  <text x="338" y="128" font-size="11" fill="#555">Business reports for learning management</text>
  <text x="338" y="144" font-size="11" fill="#555">with accounting module. Data aggregation</text>
  <text x="338" y="160" font-size="11" fill="#555">pipelines serving live dashboards.</text>
  <rect x="338" y="172" width="60" height="16" rx="8" fill="#fff0f6"/>
  <text x="368" y="184" text-anchor="middle" font-size="9" fill="#f72585" font-weight="600">Next.js</text>
  <rect x="406" y="172" width="68" height="16" rx="8" fill="#fff0f6"/>
  <text x="440" y="184" text-anchor="middle" font-size="9" fill="#4361ee" font-weight="600">Aggregation</text>
  <rect x="482" y="172" width="60" height="16" rx="8" fill="#fff0f6"/>
  <text x="512" y="184" text-anchor="middle" font-size="9" fill="#f72585" font-weight="600">MongoDB</text>

  <!-- CARD 6: Elasticsearch + Caching -->
  <rect x="606" y="50" width="264" height="148" rx="14" fill="white" filter="url(#shadow)" opacity="0.95"/>
  <rect x="606" y="50" width="264" height="5" rx="2.5" fill="url(#g6)"/>
  <text x="628" y="96" font-size="28">🔍</text>
  <text x="668" y="88" font-size="14" font-weight="700" fill="#222">Search &amp; Caching Layer</text>
  <text x="668" y="104" font-size="11" fill="#999">Elasticsearch Queries · Redis · Browser Cache</text>
  <text x="626" y="128" font-size="11" fill="#555">Wrote &amp; optimized Elasticsearch queries for</text>
  <text x="626" y="144" font-size="11" fill="#555">fast search, plus Redis &amp; browser caching</text>
  <text x="626" y="160" font-size="11" fill="#555">strategies to keep responses snappy.</text>
  <rect x="626" y="172" width="80" height="16" rx="8" fill="#f0e0ff"/>
  <text x="666" y="184" text-anchor="middle" font-size="9" fill="#7209b7" font-weight="600">Elasticsearch</text>
  <rect x="714" y="172" width="44" height="16" rx="8" fill="#e0fff4"/>
  <text x="736" y="184" text-anchor="middle" font-size="9" fill="#06d6a0" font-weight="600">Redis</text>
  <rect x="766" y="172" width="64" height="16" rx="8" fill="#f0e0ff"/>
  <text x="798" y="184" text-anchor="middle" font-size="9" fill="#7209b7" font-weight="600">Caching</text>
</svg>
