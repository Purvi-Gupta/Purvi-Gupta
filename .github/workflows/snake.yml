name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        # lets you trigger it manually too
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Purvi-Gupta
          outputs: |
            dist/github-snake.svg?color_snake=b39dff&color_dots=#0d0d1a,#150d2e,#2a1a50,#8b6dff,#b39dff
            dist/github-snake-dark.svg?color_snake=fe428e&color_dots=#0d0d1a,#150d2e,#1a0d20,#c41660,#fe428e

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
