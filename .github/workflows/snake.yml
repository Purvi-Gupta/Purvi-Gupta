name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Purvi-Gupta
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Recolor snake only
        run: |
          # The snake body uses a specific class in the SVG — replace its color only
          sed -i 's/class="snake"/class="snake" style="fill:#b39dff;stroke:#b39dff"/g' dist/github-snake.svg
          sed -i 's/class="snake"/class="snake" style="fill:#fe428e;stroke:#fe428e"/g' dist/github-snake-dark.svg

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
