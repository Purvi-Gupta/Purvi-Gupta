<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="50%" style="stop-color:#150d2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b39dff"/>
      <stop offset="100%" style="stop-color:#8b6dff"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b39dff"/>
      <stop offset="50%" style="stop-color:#00e5cc"/>
      <stop offset="100%" style="stop-color:#39d353"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blob">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="900" height="200" fill="url(#bg)" rx="16"/>

  <!-- Blobs -->
  <circle cx="80" cy="60" r="70" fill="#b39dff" opacity="0.07" filter="url(#blob)"/>
  <circle cx="820" cy="150" r="80" fill="#00e5cc" opacity="0.05" filter="url(#blob)"/>
  <circle cx="450" cy="190" r="50" fill="#39d353" opacity="0.05" filter="url(#blob)"/>
  <circle cx="680" cy="30" r="40" fill="#b39dff" opacity="0.06" filter="url(#blob)"/>

  <!-- Star dots -->
  <circle cx="55"  cy="28"  r="1.5" fill="#b39dff" opacity="0.8"/>
  <circle cx="190" cy="14"  r="1"   fill="#00e5cc" opacity="0.7"/>
  <circle cx="340" cy="22"  r="1.5" fill="#39d353"  opacity="0.6"/>
  <circle cx="560" cy="11"  r="1"   fill="#b39dff" opacity="0.8"/>
  <circle cx="730" cy="18"  r="1.5" fill="#00e5cc" opacity="0.6"/>
  <circle cx="858" cy="34"  r="1"   fill="#39d353"  opacity="0.7"/>
  <circle cx="78"  cy="172" r="1.5" fill="#00e5cc" opacity="0.5"/>
  <circle cx="825" cy="176" r="1"   fill="#b39dff" opacity="0.6"/>
  <circle cx="435" cy="184" r="1.5" fill="#39d353"  opacity="0.5"/>
  <circle cx="155" cy="182" r="1"   fill="#ffdc00" opacity="0.5"/>
  <circle cx="660" cy="179" r="1.5" fill="#b39dff" opacity="0.5"/>

  <!-- Left pills -->
  <rect x="28" y="68" width="82" height="20" rx="10" fill="#b39dff" opacity="0.13"/>
  <rect x="28" y="68" width="82" height="20" rx="10" fill="none" stroke="#b39dff" stroke-width="0.5" opacity="0.5"/>
  <text x="69" y="82" text-anchor="middle" font-size="10" fill="#b39dff" font-weight="600">Full-Stack</text>

  <rect x="118" y="68" width="72" height="20" rx="10" fill="#00e5cc" opacity="0.10"/>
  <rect x="118" y="68" width="72" height="20" rx="10" fill="none" stroke="#00e5cc" stroke-width="0.5" opacity="0.4"/>
  <text x="154" y="82" text-anchor="middle" font-size="10" fill="#00e5cc" font-weight="600">Node.js</text>

  <!-- Right pills -->
  <rect x="700" y="108" width="84" height="20" rx="10" fill="#39d353" opacity="0.10"/>
  <rect x="700" y="108" width="84" height="20" rx="10" fill="none" stroke="#39d353" stroke-width="0.5" opacity="0.4"/>
  <text x="742" y="122" text-anchor="middle" font-size="10" fill="#39d353" font-weight="600">MongoDB</text>

  <rect x="792" y="108" width="80" height="20" rx="10" fill="#ffdc00" opacity="0.10"/>
  <rect x="792" y="108" width="80" height="20" rx="10" fill="none" stroke="#ffdc00" stroke-width="0.5" opacity="0.35"/>
  <text x="832" y="122" text-anchor="middle" font-size="10" fill="#ffdc00" font-weight="600">Next.js</text>

  <!-- Emoji -->
  <text x="450" y="68" text-anchor="middle" font-size="28">👋</text>

  <!-- Name -->
  <text x="450" y="112" text-anchor="middle" font-size="44" font-weight="800" fill="url(#nameGrad)" letter-spacing="-1" filter="url(#glow)">Purvi Gupta</text>

  <!-- Tagline -->
  <text x="450" y="142" text-anchor="middle" font-size="13" fill="#00e5cc" letter-spacing="0.8" opacity="0.85">Full-Stack Engineer · From ideas to systems that scale</text>

  <!-- Stack line -->
  <text x="450" y="165" text-anchor="middle" font-size="11" fill="#444" letter-spacing="0.3">Next.js · Node.js · MongoDB · Lead Systems · Query Optimization · Subscriptions</text>

  <!-- Bottom bar -->
  <rect x="280" y="182" width="340" height="2" rx="1" fill="url(#barGrad)" opacity="0.6"/>
</svg>
